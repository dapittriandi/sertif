<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
    <title>SERTIFIKAT</title>
    <style>
        :root {
            --certificate-width: 297mm;
            --certificate-height: 210mm;
            --certificate-padding-y: 10mm;
            --certificate-padding-x: 12mm;
            --certificate-content-offset-top: 28mm;
            --certificate-signature-right: 58mm;
            --certificate-signature-bottom: 20mm;
            --certificate-signature-gap: 8mm;
            --certificate-photo-width: 24mm;
            --certificate-photo-height: 32mm;
            --certificate-qr-size: 16mm;
            --certificate-signature-width: 70mm;
            --certificate-photo-offset-top: 2mm;
            --certificate-text-size: 10pt;
            --certificate-title-size: 14pt;
            --certificate-table-gap-y: 2.4mm;
            --certificate-cell-padding-y: 1.4mm;
            --certificate-cell-padding-x: 1.8mm;
            --certificate-identity-label-width: 34mm;
            --certificate-identity-value-width: 95mm;
            --certificate-details-top-gap: 3mm;
        }

        html, body {
            width: 100%;
            min-height: 100%;
            margin: 0;
        }

        body {
            font-family: "Inter", sans-serif;
            line-height: 1.09;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 12mm 0;
            background-color: #f3f4f6;
        }

        .container {
            width: var(--certificate-width);
            height: var(--certificate-height);
            margin: 0;
            padding: var(--certificate-padding-y) var(--certificate-padding-x);
            background-image: url('/images/sertifikat_ujian_ti-affdesign3.png');
            background-size: cover;
            background-position: center;
            position: relative;
            box-sizing: border-box;
            overflow: hidden;
            box-shadow: 0 16px 40px rgba(15, 23, 42, 0.18);
        }

        .content {
            text-align: center;
            margin-top: 0;
            padding-top: var(--certificate-content-offset-top);
        }

        .content .certificate-title {
            font-size: var(--certificate-title-size);
            font-weight: bold;
            text-decoration: underline;
            padding-top: 2mm;
        }

        .content .certificate-id {
            font-size: var(--certificate-text-size);
            margin-top: 1.4mm;
        }

        .content p {
            font-size: var(--certificate-text-size);
        }

        .content table {
            margin: var(--certificate-table-gap-y) auto;
            width: 80%;
            text-align: left;
            font-size: var(--certificate-text-size);
            table-layout: fixed;
            overflow-wrap: anywhere;
            word-break: normal;
        }

        .content table td {
            border-radius: 100px;
            padding: var(--certificate-cell-padding-y) var(--certificate-cell-padding-x);
            vertical-align: top;
        }

        .identity-table {
            width: auto !important;
            margin: 12px auto;
        }

        .identity-table td:first-child {
            width: var(--certificate-identity-label-width);
            white-space: nowrap;
        }

        .identity-table td:nth-child(2) {
            min-width: var(--certificate-identity-value-width);
        }

        .details table {
            width: 74%;
            border-collapse: collapse;
            margin-top: var(--certificate-details-top-gap);
            table-layout: fixed;
        }

        .details th,
        .details td {
            border: 1px solid rgb(255, 255, 255);
            padding: 2mm;
            color: white;
            text-align: center;
            background-color: #2B4961;
            overflow-wrap: anywhere;
        }

        .details th {
            background-color: #F7B118;
        }

        .signature-wrapper {
            position: absolute;
            right: var(--certificate-signature-right);
            bottom: var(--certificate-signature-bottom);
            display: flex;
            align-items: flex-start;
            gap: var(--certificate-signature-gap);
        }

        .photo-box {
            width: var(--certificate-photo-width);
            height: var(--certificate-photo-height);
            border: 1px solid #000;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: var(--certificate-text-size);
            text-align: center;
            overflow: hidden;
            margin-top: var(--certificate-photo-offset-top);
        }

        .signature {
            text-align: left;
            width: var(--certificate-signature-width);
            font-size: var(--certificate-text-size);
        }

        .signature p {
            margin: 0;
            line-height: 1.08;
        }

        .profile-photo {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .qr-code {
            width: var(--certificate-qr-size);
            height: var(--certificate-qr-size);
            display: block;
            margin: 2mm 0 1mm;
        }

        .signature-identity {
            margin-top: 1mm;
        }

        .qr-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(255, 0, 0, 0.1);
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            z-index: 999;
            pointer-events: none;
        }

        .qr-overlay p {
            font-size: 28px;
            color: red;
            font-weight: bold;
            text-shadow: 1px 1px white;
        }

        .error-box {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100%;
            font-size: 18px;
            color: red;
            font-weight: bold;
        }

        @media print {
            @page {
                size: A4 landscape;
                margin: 0;
            }

            html, body {
                width: var(--certificate-width);
                height: var(--certificate-height);
                margin: 0;
                min-height: 0;
                padding: 0;
                display: block;
                overflow: hidden;
                background: transparent;
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
            }

            .container {
                width: var(--certificate-width);
                height: var(--certificate-height);
                margin: 0;
                overflow: hidden;
                box-shadow: none;
                break-inside: avoid;
                page-break-inside: avoid;
            }
        }
    </style>
</head>

<body>
    <div class="container" id="container">
        <!-- Konten akan diisi oleh JavaScript -->
    </div>

    <script>
        // Ambil ID dari URL: /keaslian-sertifikat/10367 → "10367"
        const id = window.location.pathname.split('/').filter(Boolean).pop();

        fetch('/data.json')
            .then(res => res.json())
            .then(data => {
                const cert = data[id];
                const container = document.getElementById('container');

                if (!cert) {
                    container.innerHTML = `
                        <div class="error-box">
                            ⚠️ Sertifikat dengan ID <b>&nbsp;${id}&nbsp;</b> tidak ditemukan.
                        </div>`;
                    return;
                }

                // Render baris nilai
                const nilaiRows = cert.nilai.map(n => `
                    <tr>
                        <td>${n.materi}</td>
                        <td>${n.nilai}</td>
                        <td>${n.grade}</td>
                    </tr>
                `).join('');

                container.innerHTML = `
                    <div class="content">
                        <div class="certificate-title">SERTIFIKAT</div>
                        <div class="certificate-id">${cert.nomor_sertifikat}</div>
                        <p style="font-size: 10px; color: red;">(Halaman ini dibuka melalui QR Code untuk keaslian sertifikat)</p>
                        <p>Unit Teknologi Informasi dan Pangkalan Data (UTIPD) <br>Universitas Islam Negeri Sultan Thaha Saifuddin Jambi menerangkan:</p>
                        <table class="identity-table">
                            <tr>
                                <td>Nama</td>
                                <td>: <b>${cert.nama}</b></td>
                            </tr>
                            <tr>
                                <td>NIM</td>
                                <td>: <b>${cert.nim}</b></td>
                            </tr>
                            <tr>
                                <td>Program Studi</td>
                                <td>: <b>${cert.prodi}</b></td>
                            </tr>
                        </table>
                        <p>Telah mengikuti Ujian Praktek Teknologi Informasi dan Komunikasi (TIK) pada tanggal
                            ${cert.tanggal_ujian}
                            <br> dan dinyatakan <b>LULUS</b> dengan nilai:
                        </p>
                        <div class="details">
                            <table>
                                <thead>
                                    <tr>
                                        <th style="color: #000; border-radius: 100px;">MATERI</th>
                                        <th style="color: #000; border-radius: 100px;">NILAI</th>
                                        <th style="color: #000; border-radius: 100px;">GRADE</th>
                                    </tr>
                                </thead>
                                <tbody>${nilaiRows}</tbody>
                            </table>
                        </div>
                        <p style="font-size: 10px;">Sertifikat ini hanya berlaku di Universitas Islam Negeri Sulthan Thaha Saifuddin Jambi</p>
                    </div>

                    <div class="signature-wrapper">
                        <div class="photo-box">
                            <img src="${cert.foto}" alt="Foto Mahasiswa" class="profile-photo">
                        </div>
                        <div class="signature">
                            <p>
                                Jambi, ${cert.tanggal_sertifikat}<br>
                                Kepala Unit Teknologi Informasi dan <br>Pangkalan Data <br>
                                <canvas id="qr-canvas" class="qr-code"></canvas>
                                <span class="signature-identity">
                                    Titin Agustin Nengsih, S.Si., M.Si., Ph.D<br>
                                    NIP. 198208162006042002
                                </span>
                            </p>
                        </div>
                    </div>

                    <div class="qr-overlay">
                        <p>(Halaman ini dibuka melalui QR Code untuk keaslian sertifikat)</p>
                    </div>
                `;

                // Generate QR Code dari URL saat ini
                QRCode.toCanvas(
                    document.getElementById('qr-canvas'),
                    window.location.href,
                    { width: 80 },
                    function (err) {
                        if (!err) {
                            // Auto print setelah semua render selesai
                            setTimeout(() => window.print(), 500);
                        }
                    }
                );
            })
            .catch(() => {
                document.getElementById('container').innerHTML = `
                    <div class="error-box">Gagal memuat data sertifikat.</div>`;
            });
    </script>
</body>

</html>
